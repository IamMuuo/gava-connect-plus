name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    # Crucial for Trusted Publishing OIDC authentication
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      # Build the source distribution (sdist) and wheel
      - name: Build package
        run: uv build

      # Publish securely to PyPI using OIDC
      - name: Publish to PyPI
        run: uv publish
